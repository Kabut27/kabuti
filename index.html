<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angalia Matumizi ya VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-emerald-400">VPN Client Portal</h1>
            <p class="text-sm text-slate-400">Weka ID au Email yako kuona matumizi ya bando</p>
        </div>

        <div class="space-y-4" id="login-section">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">VPN Client ID au Email</label>
                <input type="text" id="client-id" placeholder="Weka ID au Email yako hapa" 
                       class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 focus:outline-none focus:border-emerald-500 text-white">
            </div>
            <button onclick="checkUsageByAPI()" id="btn-submit"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 font-semibold p-3 rounded-xl transition duration-200">
                Angalia Taarifa →
            </button>
            <p id="error-msg" class="text-sm text-red-400 hidden bg-red-950/50 p-3 rounded-xl border border-red-900 text-center"></p>
        </div>

        <div id="result-section" class="hidden space-y-6">
            <div class="border-b border-slate-700 pb-4 flex justify-between items-center">
                <div>
                    <h2 id="res-remark" class="text-lg font-bold text-white">---</h2>
                    <p class="text-xs text-slate-400">Akaunti Iko Hai</p>
                </div>
                <button onclick="logout()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg">Toka</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <p class="text-xs text-slate-400">Upload</p>
                    <p id="res-up" class="text-lg font-semibold text-slate-200">0 GB</p>
                </div>
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <p class="text-xs text-slate-400">Download</p>
                    <p id="res-down" class="text-lg font-semibold text-slate-200">0 GB</p>
                </div>
            </div>

            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Jumla Uliyotumia:</span>
                    <span id="res-total-used" class="font-semibold text-emerald-400">0 GB</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Kikomo cha Bando:</span>
                    <span id="res-limit" class="font-semibold text-slate-300">Haina Kikomo</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function checkUsageByAPI() {
            const clientId = document.getElementById('client-id').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const btnSubmit = document.getElementById('btn-submit');

            if(!clientId) {
                errorMsg.innerText = "Tafadhali jaza ID au Email yako.";
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            btnSubmit.innerText = "Inatafuta...";
            btnSubmit.disabled = true;

            // URL ya VPS yako (Imeondolewa leno 'kabuti' ili iende moja kwa moja kwenye API)
            const VPS_URL = "https://rayoo.uk:88"; 

            try {
                // Hii ni Web API maalum ya 3X-UI inayotafuta matumizi kwa ID/Email bila Token ya Admin
                const response = await fetch(`${VPS_URL}/api/client/traffic?id=${clientId}`, {
                    method: "GET",
                    headers: {
                        "Accept": "application/json"
                    }
                });
                
                if (!response.ok) {
                    throw new Error("Mteja hajapatikana, au VPS imekataa kuunganisha.");
                }

                const data = await response.json();
                
                if (!data || !data.obj) {
                    throw new Error("ID au Email uliyoweka si sahihi au haina matumizi yoyote.");
                }

                const stats = data.obj; // Inarudisha up, down, total n.k.

                document.getElementById('res-remark').innerText = stats.email || "Mteja";
                document.getElementById('res-up').innerText = formatBytes(stats.up);
                document.getElementById('res-down').innerText = formatBytes(stats.down);
                document.getElementById('res-total-used').innerText = formatBytes(stats.up + stats.down);

                if (stats.total > 0) {
                    document.getElementById('res-limit').innerText = formatBytes(stats.total);
                } else {
                    document.getElementById('res-limit').innerText = "Haina Kikomo";
                }

                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

            } catch (err) {
                errorMsg.innerText = "Error: Imeshindwa kuvuta data. Hakikisha umewasha CORS kwenye Panel settings na umezima Firewall.";
                errorMsg.classList.remove('hidden');
            } finally {
                btnSubmit.innerText = "Angalia Taarifa →";
                btnSubmit.disabled = false;
            }
        }

        function logout() {
            document.getElementById('client-id').value = '';
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
