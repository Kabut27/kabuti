<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angalia Matumizi ya VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-emerald-400">VPN Client Portal</h1>
            <p class="text-sm text-slate-400">Weka ID au Email yako kuona matumizi ya bando</p>
        </div>

        <div class="space-y-4" id="login-section">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">VPN Client ID au Email</label>
                <input type="text" id="client-id" placeholder="Weka ID au Email hapa" 
                       class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 focus:outline-none focus:border-emerald-500 text-white">
            </div>
            <button onclick="checkUsageByAdminAPI()" id="btn-submit"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 font-semibold p-3 rounded-xl transition duration-200">
                Angalia Taarifa →
            </button>
            <p id="error-msg" class="text-sm text-red-400 hidden bg-red-950/50 p-3 rounded-xl border border-red-900 text-center"></p>
        </div>

        <div id="result-section" class="hidden space-y-6">
            <div class="border-b border-slate-700 pb-4 flex justify-between items-center">
                <div>
                    <h2 id="res-remark" class="text-lg font-bold text-white">---</h2>
                    <p class="text-xs text-slate-400">Akaunti Iko Hai</p>
                </div>
                <button onclick="logout()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg">Toka</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <p class="text-xs text-slate-400">Upload</p>
                    <p id="res-up" class="text-lg font-semibold text-slate-200">0 GB</p>
                </div>
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <p class="text-xs text-slate-400">Download</p>
                    <p id="res-down" class="text-lg font-semibold text-slate-200">0 GB</p>
                </div>
            </div>

            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Jumla Uliyotumia:</span>
                    <span id="res-total-used" class="font-semibold text-emerald-400">0 GB</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Kikomo cha Bando:</span>
                    <span id="res-limit" class="font-semibold text-slate-300">Haina Kikomo</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function checkUsageByAdminAPI() {
            const userInput = document.getElementById('client-id').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-msg');
            const btnSubmit = document.getElementById('btn-submit');

            if(!userInput) {
                errorMsg.innerText = "Tafadhali jaza ID au Email yako.";
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            btnSubmit.innerText = "Inatafuta...";
            btnSubmit.disabled = true;

            // CONFIGURATION YAKO YA VPS
            const BASE_URL = "https://rayoo.uk:88/kabuti"; 
            const TOKEN = "j6zbQ6KF19jehkUIoWnoNAktKhINbpUq8b7gQVQ1nhM0ElH"; 

            try {
                // Tunaita API kuu ya inbounds kulingana na muundo wa panel yako
                const response = await fetch(`${BASE_URL}/panel/api/inbounds`, {
                    method: "GET",
                    headers: {
                        "Accept": "application/json",
                        "X-Token": TOKEN
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Server imekataa kuunganisha. Status: ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.success || !data.obj) {
                    throw new Error("Imeshindwa kusoma data kutoka kwenye VPS.");
                }

                let clientStats = null;
                let clientEmail = "";

                // Tafuta mteja kwa kulinganisha ID au Email kwenye kila Inbound
                for (const inbound of data.obj) {
                    if (!inbound.settings) continue;
                    let settings;
                    try { settings = JSON.parse(inbound.settings); } catch(e) { continue; }

                    if (settings.clients) {
                        const found = settings.clients.find(c => 
                            (c.id && c.id.toLowerCase() === userInput) || 
                            (c.email && c.email.toLowerCase() === userInput)
                        );

                        if (found) {
                            clientEmail = found.email;
                            // Kupata stats zake halisi (up, down, total) kutoka kwenye safu ya clientStats ya inbound husika
                            if (inbound.clientStats) {
                                const stats = inbound.clientStats.find(s => s.email === found.email);
                                if (stats) {
                                    clientStats = stats;
                                }
                            }
                            break;
                        }
                    }
                }

                if (!clientStats) {
                    throw new Error("ID au Email hii haipo kwenye mfumo wako au haina matumizi.");
                }

                // Onyesha matokeo kwenye UI
                document.getElementById('res-remark').innerText = clientEmail || "Mteja wetu";
                document.getElementById('res-up').innerText = formatBytes(clientStats.up);
                document.getElementById('res-down').innerText = formatBytes(clientStats.down);
                document.getElementById('res-total-used').innerText = formatBytes(clientStats.up + clientStats.down);

                if (clientStats.total > 0) {
                    document.getElementById('res-limit').innerText = formatBytes(clientStats.total);
                } else {
                    document.getElementById('res-limit').innerText = "Haina Kikomo";
                }

                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btnSubmit.innerText = "Angalia Taarifa →";
                btnSubmit.disabled = false;
            }
        }

        function logout() {
            document.getElementById('client-id').value = '';
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
