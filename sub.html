<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#060d1f"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Kabuti Bando</title>
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Kabuti Bando&quot;,&quot;short_name&quot;:&quot;KB&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#060d1f&quot;,&quot;theme_color&quot;:&quot;#060d1f&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060d1f'/%3E%3Cpath d='M35 20 L58 48 L44 48 L65 80 L42 52 L56 52 Z' fill='%2338bdf8'/%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── INLINE SVG ICONS ── */
    .svg-icon { display:inline-block; width:1em; height:1em; vertical-align:-.125em; fill:currentColor; }
  </style>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

    :root {
      --font: "Space Grotesk", "Inter", system-ui, sans-serif;
      --bg: #060d1f;
      --txt: #f0f6ff;
      --txt2: #94a3c4;
      --txt3: #4a5a7a;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --grad: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      --grad-r: linear-gradient(135deg, #818cf8 0%, #38bdf8 100%);
      --card: rgba(8,16,38,0.85);
      --card2: rgba(12,22,50,0.9);
      --border: rgba(56,189,248,0.13);
      --border-hi: rgba(56,189,248,0.4);
      --inner: rgba(56,189,248,0.07);
      --glow: rgba(56,189,248,0.25);
      --ok-bg: rgba(16,185,129,0.12);
      --ok-bd: rgba(16,185,129,0.4);
      --ok-tx: #34d399;
      --err-bg: rgba(239,68,68,0.12);
      --err-bd: rgba(239,68,68,0.38);
      --err-tx: #f87171;
      --warn: #fbbf24;
      --danger: #ef4444;
      --success: #10b981;
      --r1: 0.75rem; --r2: 1rem; --r3: 1.35rem; --r4: 1.6rem; --r5: 2rem;
      --sh: 0 4px 24px rgba(0,0,0,0.5);
      --sh2: 0 8px 40px rgba(0,0,0,0.65);
      --shg: 0 0 28px var(--glow);
      color-scheme: dark;
    }
    html[data-theme="light"] {
      --bg: #f0f6ff;
      --txt: #0c1a38; --txt2: #3a4f72; --txt3: #7a90b8;
      --card: rgba(255,255,255,0.92);
      --card2: rgba(240,248,255,0.95);
      --border: rgba(56,130,250,0.14);
      --border-hi: rgba(56,130,250,0.42);
      --inner: rgba(56,130,250,0.07);
      --glow: rgba(56,130,250,0.18);
      --ok-bg: rgba(16,185,129,0.1);
      --ok-tx: #059669;
      --ok-bd: rgba(16,185,129,0.35);
      --err-tx: #dc2626;
      --sh: 0 2px 16px rgba(12,26,56,0.08);
      --sh2: 0 6px 24px rgba(12,26,56,0.13);
      color-scheme: light;
    }

    html, body {
      width:100%; max-width:100vw; overflow-x:hidden;
      height:100%; min-height:100vh; min-height:100dvh;
    }
    body {
      font-family: var(--font);
      color: var(--txt);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    /* ── BG LAYERS ── */
    .bg-layer {
      position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
    }
    .bg-orb {
      position:absolute; border-radius:50%; filter:blur(80px);
      animation: orb-drift 18s ease-in-out infinite alternate;
    }
    .bg-orb-1 {
      width:55vw; height:55vw; top:-15vw; left:-10vw;
      background: radial-gradient(circle, rgba(56,189,248,0.18) 0%, transparent 70%);
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width:50vw; height:50vw; top:30vh; right:-15vw;
      background: radial-gradient(circle, rgba(129,140,248,0.16) 0%, transparent 70%);
      animation-delay: -6s;
    }
    .bg-orb-3 {
      width:60vw; height:60vw; bottom:-20vw; left:15vw;
      background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
      animation-delay: -12s;
    }
    .bg-grid {
      position:absolute; inset:0;
      background-image: linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    @keyframes orb-drift {
      0%  { transform: translate(0,0) scale(1); }
      50% { transform: translate(4vw, -6vh) scale(1.08); }
      100%{ transform: translate(-3vw, 5vh) scale(0.94); }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-orb { animation:none; }
    }

    /* ── MAIN LAYOUT ── */
    .page {
      position: relative; z-index:1;
      width: min(100%, 480px);
      margin-inline: auto;
      padding: env(safe-area-inset-top, 1rem) 1rem calc(env(safe-area-inset-bottom, 0) + 2rem);
      display: flex; flex-direction: column;
      gap: 0.85rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes shimmer {
      0%   { left:-160%; }
      22%  { left:160%; }
      100% { left:160%; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:.6; transform:scale(0.75); }
    }

    .fade-up { animation: fadeUp 0.45s ease-out forwards; opacity:0; }
    .d1 { animation-delay:.07s; }
    .d2 { animation-delay:.14s; }
    .d3 { animation-delay:.21s; }
    .d4 { animation-delay:.28s; }
    .d5 { animation-delay:.35s; }

    .shimmer { position:relative; overflow:hidden; }
    .shimmer::after {
      content:""; position:absolute; top:0; left:-160%; width:50%; height:100%;
      background:linear-gradient(to right, transparent, rgba(255,255,255,0.35), transparent);
      transform:skewX(-20deg); animation:shimmer 4.5s infinite ease-in-out;
      pointer-events:none;
    }

    /* ── HEADER ── */
    .header {
      padding: max(1rem, env(safe-area-inset-top,1rem)) 1rem 1rem;
      display: flex; align-items:center; justify-content:space-between; gap:.75rem;
    }
    .brand { display:flex; align-items:center; gap:.75rem; min-width:0; flex:1; }
    .logo {
      width:3rem; height:3rem; border-radius:var(--r2);
      background:var(--grad); box-shadow:var(--shg);
      display:grid; place-items:center; font-size:1.25rem; color:#fff; flex:0 0 auto;
    }
    .brand-name {
      font-size:1.3rem; font-weight:800; letter-spacing:-.03em; line-height:1.1;
      background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brand-sub { font-size:.7rem; font-weight:600; color:var(--txt3); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
    .user-chip {
      margin-top:.3rem; display:none; align-items:center; gap:.4rem;
    }
    .user-chip svg { color:#a78bfa; font-size:.8rem; flex:0 0 auto; }
    .user-name {
      font-size:1rem; font-weight:800; letter-spacing:-.01em;
      background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hdr-actions { display:flex; align-items:center; gap:.4rem; }
    .icon-btn {
      width:2.4rem; height:2.4rem; border-radius:50%;
      border:1px solid var(--border-hi); background:var(--inner);
      color:var(--txt); cursor:pointer; font-size:.9rem;
      display:grid; place-items:center; transition:all .2s; flex:0 0 auto;
      text-decoration:none;
    }
    .icon-btn:hover, .icon-btn:active {
      background:var(--grad); color:#fff; border-color:transparent; box-shadow:var(--shg);
    }

    /* ── STATUS PILL ── */
    .status-pill {
      display:flex; align-items:center; justify-content:space-between; gap:.6rem;
      padding:.65rem 1.1rem;
      background:var(--ok-bg); border:1px solid var(--ok-bd);
      border-radius:999px; transition:all .3s;
    }
    .status-pill.inactive { background:var(--err-bg); border-color:var(--err-bd); }
    .status-left { display:flex; align-items:center; gap:.55rem; }
    .status-dot {
      width:.6rem; height:.6rem; border-radius:50%; background:var(--ok-tx); flex:0 0 auto;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .status-pill.inactive .status-dot { background:var(--err-tx); animation:none; }
    .status-label { font-size:.82rem; font-weight:800; color:var(--ok-tx); }
    .status-pill.inactive .status-label { color:var(--err-tx); }
    .status-expiry { font-size:.72rem; font-weight:700; color:var(--txt2); }

    /* ── HERO CARD ── */
    .hero-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r5);
      box-shadow:var(--sh2);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      overflow:hidden;
      padding:1.5rem 1.25rem 1.25rem;
    }

    /* Ring */
    .ring-center {
      display:flex; flex-direction:column; align-items:center; gap:1rem;
    }
    .ring-wrap {
      position:relative;
      width:clamp(8.5rem,42vw,11rem); height:clamp(8.5rem,42vw,11rem);
      border-radius:50%; overflow:hidden;
      background:var(--card2);
      border:2.5px solid var(--border-hi);
      box-shadow:var(--shg), var(--sh);
    }
    .ring-svg { width:100%; height:100%; display:block; }
    .water-wave { transition:fill .5s; }
    @keyframes wL { 0%{transform:translate(0,var(--wy,30px));} 100%{transform:translate(-100px,var(--wy,30px));} }
    @keyframes wR { 0%{transform:translate(-100px,var(--wy,30px));} 100%{transform:translate(0,var(--wy,30px));} }
    .wb { opacity:.45; animation:wL 3s linear infinite; }
    .wf { opacity:.9; animation:wR 2.2s linear infinite; }
    .ring-label {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; z-index:10;
      text-shadow:0 2px 6px rgba(0,0,0,0.7);
    }
    .ring-pct { font-size:clamp(1.9rem,8vw,2.7rem); font-weight:900; line-height:1; color:#fff; }
    .ring-sub { font-size:.75rem; font-weight:700; color:rgba(255,255,255,.8); margin-top:.2rem; letter-spacing:.05em; text-transform:uppercase; }

    /* Traffic row under ring */
    .traffic-row {
      width:100%; display:grid; grid-template-columns:1fr 1fr; gap:.65rem;
    }
    .traffic-card {
      background:var(--inner); border:1px solid var(--border);
      border-radius:var(--r2); padding:.85rem .75rem;
      display:flex; flex-direction:column; align-items:center; gap:.18rem;
    }
    .traffic-icon { font-size:1rem; margin-bottom:.1rem; }
    .traffic-icon.dl { color:var(--accent); }
    .traffic-icon.ul { color:var(--accent2); }
    .traffic-val { font-size:1.2rem; font-weight:900; color:var(--txt); direction:ltr; }
    .traffic-unit { font-size:.7rem; font-weight:800; color:var(--accent); margin-left:.12rem; }
    .traffic-label { font-size:.66rem; font-weight:700; color:var(--txt3); letter-spacing:.04em; text-transform:uppercase; }

    /* ── STATS GRID ── */
    .stats-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:.65rem;
    }
    .stat-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r3);
      padding:1rem .9rem;
      display:flex; flex-direction:column; gap:.25rem;
      position:relative; overflow:hidden;
      box-shadow:var(--sh);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      transition:transform .2s, border-color .2s, box-shadow .2s;
    }
    .stat-card::before {
      content:""; position:absolute; top:0; left:0; right:0; height:2px;
      background:var(--grad); opacity:0; transition:opacity .2s;
    }
    .stat-card:hover { transform:translateY(-2px); border-color:var(--border-hi); box-shadow:var(--sh2); }
    .stat-card:hover::before { opacity:1; }
    .stat-lbl {
      font-size:.7rem; font-weight:700; color:var(--txt2);
      display:flex; align-items:center; gap:.3rem;
      letter-spacing:.04em; text-transform:uppercase;
    }
    .stat-lbl i { font-size:.72rem; }
    .stat-lbl .ic-used  { color:#38bdf8; }
    .stat-lbl .ic-total { color:#818cf8; }
    .stat-lbl .ic-rem   { color:#34d399; }
    .stat-lbl .ic-exp   { color:#fbbf24; }
    .stat-val { font-size:clamp(1.35rem,5vw,1.8rem); font-weight:900; line-height:1.05; color:var(--txt); direction:ltr; }
    .stat-unit { color:var(--accent); font-size:.75rem; font-weight:800; margin-left:.15rem; }

    /* ── COUNTDOWN ── */
    .countdown-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r4);
      padding:1.1rem 1rem;
      display:flex; flex-direction:column; align-items:center; gap:.75rem;
      box-shadow:var(--sh);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }
    .cd-header {
      display:flex; align-items:center; gap:.45rem;
      font-size:.75rem; font-weight:700; color:var(--txt2);
      letter-spacing:.06em; text-transform:uppercase;
    }
    .cd-header i { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .cd-row { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; width:100%; }
    .cd-box {
      background:var(--inner); border:1px solid var(--border);
      border-radius:var(--r2); padding:.7rem .4rem; text-align:center;
      position:relative; overflow:hidden;
    }
    .cd-box::before {
      content:""; position:absolute; top:0; left:0; right:0; height:1.5px;
      background:var(--grad);
    }
    .cd-num {
      font-size:clamp(1.4rem,6vw,1.8rem); font-weight:900; direction:ltr;
      background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      line-height:1.1;
    }
    .cd-lbl { font-size:.62rem; font-weight:700; color:var(--txt3); display:block; margin-top:.15rem; letter-spacing:.05em; text-transform:uppercase; }
    .last-online {
      font-size:.7rem; font-weight:700; color:var(--txt2);
      display:none; align-items:center; gap:.35rem;
      padding:.3rem .85rem; background:var(--inner); border:1px solid var(--border);
      border-radius:999px;
    }
    .last-online i { color:var(--accent); font-size:.65rem; }

    /* ── FOOTER ── */
    .footer {
      padding:.75rem 1rem .5rem;
      text-align:center; font-size:.68rem; font-weight:600; color:var(--txt3);
    }
    .footer span {
      background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      font-weight:800;
    }

    /* ── RENEW BUTTON ── */
    .renew-banner {
      display: none;
      align-items: center; justify-content: space-between; gap: .75rem;
      padding: .85rem 1.1rem;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.35);
      border-radius: var(--r3); animation: fadeUp .35s ease-out forwards;
    }
    .renew-banner.warn {
      background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.35);
    }
    .renew-left { display: flex; flex-direction: column; gap: .15rem; }
    .renew-title { font-size: .82rem; font-weight: 800; color: var(--err-tx); }
    .renew-banner.warn .renew-title { color: var(--warn); }
    .renew-desc { font-size: .7rem; font-weight: 600; color: var(--txt2); }
    .renew-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .5rem 1rem; border-radius: 999px;
      background: var(--grad); color: #fff;
      font-size: .8rem; font-weight: 800; text-decoration: none;
      border: none; cursor: pointer; white-space: nowrap; flex: 0 0 auto;
      box-shadow: 0 2px 12px rgba(56,189,248,0.35);
      transition: opacity .2s, transform .15s;
    }
    .renew-btn:hover { opacity: .9; transform: translateY(-1px); }

    /* ── LAST UPDATED BADGE ── */
    .last-updated {
      display: none; align-items: center; gap: .25rem;
      font-size: .62rem; font-weight: 700; color: var(--txt3);
      padding: .2rem .55rem; background: var(--inner); border: 1px solid var(--border);
      border-radius: 999px; white-space: nowrap;
    }
    .last-updated svg { width: .65rem; height: .65rem; opacity: .7; flex: 0 0 auto; }

    /* ── DIVIDER LABEL ── */
    .section-label {
      font-size:.68rem; font-weight:700; color:var(--txt3);
      letter-spacing:.1em; text-transform:uppercase;
      display:flex; align-items:center; gap:.5rem;
      padding:0 .1rem;
    }
    .section-label::after {
      content:""; flex:1; height:1px; background:var(--border);
    }
  </style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-layer">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
</div>

<div class="page">

      <!-- HEADER -->
      <div class="header fade-up">
        <div class="brand">
          <div class="logo shimmer"><svg class="svg-icon" style="font-size:1.25rem;color:#fff" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
          <div>
            <div class="brand-name" id="panelTitle">Kabuti Bando</div>
            <div class="brand-sub">Subscription</div>
            <div class="user-chip" id="userChip">
              <svg class="svg-icon" style="font-size:.8rem;color:#a78bfa" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
              <span class="user-name" id="userEmail"></span>
            </div>
          </div>
        </div>
        <div class="hdr-actions">
          <div class="last-updated" id="lastUpdated">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            <span id="lastUpdatedTime"></span>
          </div>
          <a id="supportBtn" class="icon-btn" target="_blank" rel="noopener" style="display:none">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.93c-.12.58-.46.72-.93.44l-2.58-1.9-1.24 1.2c-.14.13-.26.25-.52.25l.18-2.62 4.74-4.27c.2-.18-.05-.28-.32-.1l-5.86 3.7-2.52-.79c-.55-.17-.56-.55.12-.82l9.82-3.79c.46-.16.86.11.79.77z"/></svg>
          </a>
          <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">
            <svg id="themeIcon" class="svg-icon" viewBox="0 0 24 24"><path id="themeIconPath" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          </button>
        </div>
      </div>

      <!-- STATUS PILL -->
      <div class="status-pill fade-up d1" id="statusBanner">
        <div class="status-left">
          <div class="status-dot"></div>
          <span class="status-label" id="statusLabel">Active</span>
        </div>
        <span class="status-expiry" id="statusExpiry"></span>
      </div>

      <!-- RENEW BANNER (shown when expired or nearly out of data) -->
      <div class="renew-banner fade-up d1" id="renewBanner">
        <div class="renew-left">
          <span class="renew-title" id="renewTitle">Plan Expired</span>
          <span class="renew-desc" id="renewDesc">Your subscription has ended</span>
        </div>
        <button id="renewBtn" class="renew-btn" type="button" onclick="document.getElementById('payModal').style.display='flex'">
          <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          Renew
        </button>
      </div>

      <!-- PAYMENT MODAL -->
      <div id="payModal" style="display:none;position:fixed;inset:0;z-index:999;align-items:center;justify-content:center;padding:1.25rem;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);" onclick="if(event.target===this)this.style.display='none'">
        <div style="background:var(--card2);border:1px solid var(--border-hi);border-radius:var(--r4);padding:1.5rem 1.25rem;width:100%;max-width:360px;box-shadow:var(--sh2);animation:fadeUp .3s ease-out;">
          <!-- Header -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;">
            <div style="display:flex;align-items:center;gap:.6rem;">
              <div style="width:2.2rem;height:2.2rem;border-radius:var(--r1);background:var(--grad);display:grid;place-items:center;">
                <svg class="svg-icon" style="color:#fff;font-size:1rem" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
              </div>
              <div>
                <div style="font-size:.95rem;font-weight:800;color:var(--txt)">Payment Details</div>
                <div style="font-size:.65rem;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em">Lipa kupitia</div>
              </div>
            </div>
            <button onclick="document.getElementById('payModal').style.display='none'" style="background:var(--inner);border:1px solid var(--border);border-radius:50%;width:2rem;height:2rem;cursor:pointer;color:var(--txt2);display:grid;place-items:center;">
              <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>

          <!-- NMB -->
          <div style="background:var(--inner);border:1px solid var(--border);border-radius:var(--r3);padding:1rem 1.1rem;margin-bottom:.75rem;">
            <div style="font-size:.65rem;font-weight:700;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.35rem;">🏦 NMB Bank</div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;">
              <span id="nmbNum" style="font-size:1.25rem;font-weight:900;color:var(--txt);letter-spacing:.08em;direction:ltr;">63510002475</span>
              <button onclick="copyText('nmbNum','nmbCopy')" id="nmbCopy" style="background:var(--grad);border:none;border-radius:var(--r1);padding:.35rem .75rem;cursor:pointer;color:#fff;font-size:.72rem;font-weight:800;white-space:nowrap;transition:opacity .2s;">Copy</button>
            </div>
          </div>

          <!-- Vodalipa -->
          <div style="background:var(--inner);border:1px solid var(--border);border-radius:var(--r3);padding:1rem 1.1rem;margin-bottom:1.1rem;">
            <div style="font-size:.65rem;font-weight:700;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.35rem;">📱 Vodalipa</div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;">
              <span id="vodaNum" style="font-size:1.25rem;font-weight:900;color:var(--txt);letter-spacing:.08em;direction:ltr;">37931258</span>
              <button onclick="copyText('vodaNum','vodaCopy')" id="vodaCopy" style="background:var(--grad);border:none;border-radius:var(--r1);padding:.35rem .75rem;cursor:pointer;color:#fff;font-size:.72rem;font-weight:800;white-space:nowrap;transition:opacity .2s;">Copy</button>
            </div>
          </div>

          <button onclick="document.getElementById('payModal').style.display='none'" style="width:100%;padding:.75rem;background:var(--inner);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;color:var(--txt2);font-size:.82rem;font-weight:700;">Close</button>
        </div>
      </div>

      <!-- SECTION LABEL -->
      <div class="section-label fade-up d2">Time Remaining</div>

      <!-- COUNTDOWN -->
      <div class="countdown-card fade-up d2">
        <div class="cd-header">
          <svg class="svg-icon" style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent" viewBox="0 0 24 24"><path d="M6 2v6l2.5 2.5L6 13v6c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2v-6l-2.5-2.5L18 8V2H6zm7 11.5V17H11v-3.5l1-1 1 1zm2-9.5v2H9V4h6z"/></svg>
          <span id="cdTitle">Remaining Time</span>
        </div>
        <div class="cd-row">
          <div class="cd-box"><div class="cd-num" id="cdDays">0</div><span class="cd-lbl">Days</span></div>
          <div class="cd-box"><div class="cd-num" id="cdHours">0</div><span class="cd-lbl">Hours</span></div>
          <div class="cd-box"><div class="cd-num" id="cdMins">0</div><span class="cd-lbl">Mins</span></div>
        </div>
        <div class="last-online" id="lastOnline">
          <svg class="svg-icon" style="font-size:.65rem;color:var(--accent)" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          <span id="loLabel"></span><span id="loDate"></span>
        </div>
      </div>

      <!-- HERO CARD (Ring + Traffic) -->
      <div class="hero-card fade-up d3">
        <div class="ring-center">
          <div class="ring-wrap">
            <svg viewBox="0 0 100 100" class="ring-svg">
              <circle cx="50" cy="50" r="46" fill="var(--inner)" stroke="var(--border)" stroke-width="1"/>
              <clipPath id="clip"><circle cx="50" cy="50" r="44"/></clipPath>
              <g clip-path="url(#clip)">
                <path id="wv1" class="water-wave wb" d="M 0 0 Q 25 -5 50 0 T 100 0 T 150 0 T 200 0 L 200 120 L 0 120 Z"/>
                <path id="wv2" class="water-wave wf" d="M 0 0 Q 25 5 50 0 T 100 0 T 150 0 T 200 0 L 200 120 L 0 120 Z"/>
              </g>
              <circle cx="50" cy="50" r="44" fill="none" stroke="var(--border-hi)" stroke-width="1" opacity=".4"/>
            </svg>
            <div class="ring-label">
              <span class="ring-pct" id="ringPct">0%</span>
              <span class="ring-sub">Used</span>
            </div>
          </div>
        </div>

        <div style="height:.9rem"></div>

        <div class="traffic-row">
          <div class="traffic-card">
            <svg class="svg-icon traffic-icon dl" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            <div><span class="traffic-val" id="dlVal">0</span><span class="traffic-unit" id="dlUnit">GB</span></div>
            <span class="traffic-label">Download</span>
          </div>
          <div class="traffic-card">
            <svg class="svg-icon traffic-icon ul" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
            <div><span class="traffic-val" id="ulVal">0</span><span class="traffic-unit" id="ulUnit">GB</span></div>
            <span class="traffic-label">Upload</span>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="footer fade-up d5">
        Powered by <span>Kabuti Bando</span>
      </div>

    </div><!-- /page -->

<script>
  const templateVars = {
    enabled:      "{{ .enabled }}",
    download:     "{{ .download }}",
    upload:       "{{ .upload }}",
    total:        "{{ .total }}",
    expire:       "{{ .expire }}",
    lastOnline:   "{{ .lastOnline }}",
    downloadByte: "{{ .downloadByte }}",
    uploadByte:   "{{ .uploadByte }}",
    totalByte:    "{{ .totalByte }}",
    subTitle:     "{{ .subTitle }}",
    subSupportUrl:"{{ .subSupportUrl }}",
    emails:`{{ range .emails }}{{ . }}\n{{ end }}`,
  };

  // ── SKELETON: hide flash of zeros — removed immediately since data is synchronous ──
  // (class added then immediately removed after renderStats runs)

  const KB=1024,MB=1048576,GB=1073741824;

  function isTpl(v){return typeof v==="string"&&v.includes("{{")&&v.includes("}}");}
  function n(v,fb=""){const t=String(v??"").trim();return(!t||isTpl(t))?fb:t;}
  function num(v){const s=n(v);if(!s)return null;const x=Number(s.replace(/,/g,""));return isNaN(x)?null:x;}
  function isUnlim(v){return/unlimited|infinite|∞/i.test(String(v??""));}
  function bytes(v){
    const s=n(v);if(!s)return null;
    if(isUnlim(s))return 0;
    const m=s.match(/-?\d+(?:\.\d+)?/);if(!m)return null;
    const x=parseFloat(m[0]);
    if(/tb/i.test(s))return x*1099511627776;
    if(/gb/i.test(s))return x*GB;
    if(/mb/i.test(s))return x*MB;
    if(/kb/i.test(s))return x*KB;
    return x;
  }
  function expiry(v){
    const s=n(v);if(!s)return null;
    const x=num(s);
    if(x&&x>0){const ms=x<1e12?x*1000:x;const d=new Date(ms);if(!isNaN(d.getTime())&&d.getFullYear()>=2000)return d;}
    const d2=new Date(s);return isNaN(d2.getTime())?null:d2;
  }
  function emails(v){const s=n(v);return s?[...new Set(s.split(/[,\s]+/).filter(Boolean))]:[];}
  function p2(x){return String(x).padStart(2,"0");}
  function fDate(d){return d?`${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())}`:"?";}
  function fDT(d){return d?`${fDate(d)} ${p2(d.getHours())}:${p2(d.getMinutes())}`:"?";}

  function safets(v){
    const s=n(v);if(!s)return null;
    const m=s.match(/-?\d+(?:\.\d+)?/);if(!m)return null;
    const x=+m[0];if(!isFinite(x)||x<=0)return null;
    const now=Date.now(),cs=[];
    [x,x*1000,x/1000].forEach(ms=>{
      if(!isFinite(ms)||ms<=0)return;
      const d=new Date(ms);if(isNaN(d.getTime()))return;
      const y=d.getFullYear();if(y>=2000&&y<=2100)cs.push({d,s:Math.abs(ms-now)});
    });
    return cs.length?cs.sort((a,b)=>a.s-b.s)[0].d:null;
  }

  function fmtB(b){
    const x=isFinite(+b)&&+b>0?+b:0;
    if(x<KB)return{v:x.toFixed(0),u:"B"};
    if(x<MB)return{v:(x/KB).toFixed(1).replace(/\.0$/,""),u:"KB"};
    if(x<GB)return{v:(x/MB).toFixed(1).replace(/\.0$/,""),u:"MB"};
    return{v:(x/GB).toFixed(1).replace(/\.0$/,""),u:"GB"};
  }
  function setVol(vid,uid,b){
    const el=document.getElementById(vid);if(!el)return;
    const{v,u}=fmtB(b);el.innerText=v;
    const uel=uid?document.getElementById(uid):null;if(uel)uel.innerText=u;
  }

  let totalB = num(templateVars.totalByte) ?? bytes(templateVars.total);
  let upB    = num(templateVars.uploadByte) ?? bytes(templateVars.upload) ?? 0;
  let downB  = num(templateVars.downloadByte) ?? bytes(templateVars.download) ?? 0;
  if(!isFinite(upB))upB=0;
  if(!isFinite(downB))downB=0;

  const usedB   = upB+downB;
  const unlim   = (totalB!==null&&totalB<=0)||isUnlim(templateVars.total);
  const totalGB = totalB&&totalB>0?totalB/GB:0;
  const usedGB  = usedB/GB;
  const expDate = expiry(templateVars.expire);
  const emailL  = emails(templateVars.emails);
  const supUrl  = n(templateVars.subSupportUrl);
  const enabled = n(templateVars.enabled,"true").toLowerCase()!=="false";

  let dark=(localStorage.getItem("kb_theme")||"dark")!=="light";
  let cdTick=null;

  function renderStats(){
    const pct=!unlim&&totalGB>0?Math.min(100,Math.max(0,(usedGB/totalGB)*100)):0;
    const rem=!unlim&&totalB&&totalB>0?Math.max(0,totalB-usedB):0;

    document.getElementById("ringPct").innerText=unlim?"∞":Math.floor(pct)+"%";
    // Professional color scale: teal → indigo → rose-red
    let wc=unlim?"#0ea5e9":pct>=80?"#e11d48":pct>=60?"#f59e0b":pct>=30?"#6366f1":"#0ea5e9";
    const wy=unlim?28:Math.max(12,Math.min(98,100-pct*0.86));
    ["wv1","wv2"].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.style.fill=wc;el.style.setProperty("--wy",wy+"px");}
    });
    // Tint the ring border glow to match water color
    const ringWrap=document.querySelector(".ring-wrap");
    if(ringWrap) ringWrap.style.boxShadow=`0 0 28px ${wc}55, 0 4px 24px rgba(0,0,0,0.5)`;

    setVol("dlVal","dlUnit",downB);
    setVol("ulVal","ulUnit",upB);

    const now=new Date();
    const isExpired=expDate&&expDate<=now;
    const dataOut=!unlim&&usedGB>=totalGB&&totalGB>0;
    const remPct=!unlim&&totalGB>0?(1-(usedGB/totalGB))*100:100;
    const nearlyOut=!unlim&&remPct<10&&remPct>0;
    const active=enabled&&!isExpired&&!dataOut;

    const banner=document.getElementById("statusBanner");
    banner.classList.toggle("inactive",!active);
    document.getElementById("statusLabel").innerText=active?"Active":"Inactive";
    document.getElementById("statusExpiry").innerText=expDate?fDate(expDate):"";

    // ── RENEW BANNER ──
    const rb=document.getElementById("renewBanner");
    if(isExpired||dataOut){
      rb.style.display="flex"; rb.classList.remove("warn");
      document.getElementById("renewTitle").innerText=isExpired?"Plan Expired":"Data Exhausted";
      document.getElementById("renewDesc").innerText=isExpired?"Your subscription has ended":"You've used all your data";
    }else if(nearlyOut||(!isExpired&&expDate&&(expDate-now)<5*86400000)){
      rb.style.display="flex"; rb.classList.add("warn");
      const daysLeft=Math.ceil((expDate-now)/86400000);
      document.getElementById("renewTitle").innerText=nearlyOut?"Almost Out of Data":"Expiring Soon";
      document.getElementById("renewDesc").innerText=nearlyOut?`Only ${remPct.toFixed(0)}% data remaining`:`${daysLeft} day${daysLeft!==1?"s":""} left — expires ${fDate(expDate)}`;
    }else{
      rb.style.display="none";
    }

    // ── LAST UPDATED ──
    const lu=document.getElementById("lastUpdated");
    const lut=document.getElementById("lastUpdatedTime");
    const loadTime=new Date();
    lu.style.display="inline-flex";
    lut.innerText=`Synced ${p2(loadTime.getMonth()+1)}/${p2(loadTime.getDate())} ${p2(loadTime.getHours())}:${p2(loadTime.getMinutes())}`;

    // Remove skeleton after first render
    document.body.classList.remove("loading");
  }

  function renderLastOnline(){
    const box=document.getElementById("lastOnline");
    const d=safets(templateVars.lastOnline);
    if(d){
      box.style.display="inline-flex";
      document.getElementById("loLabel").innerText="Last Online: ";
      document.getElementById("loDate").innerText=fDT(d);
    }else box.style.display="none";
  }

  function renderCountdown(){
    if(cdTick)clearInterval(cdTick);
    if(!expDate){
      ["cdDays","cdHours","cdMins"].forEach(id=>document.getElementById(id).innerText="∞");
      document.getElementById("cdTitle").innerText="No Time Limit";
      renderLastOnline();return;
    }
    const end=expDate.getTime();
    function tick(){
      const diff=Math.max(0,end-Date.now());
      document.getElementById("cdDays").innerText=Math.floor(diff/86400000);
      document.getElementById("cdHours").innerText=Math.floor((diff%86400000)/3600000);
      document.getElementById("cdMins").innerText=Math.floor((diff%3600000)/60000);
      if(diff<=0)clearInterval(cdTick);
    }
    tick();cdTick=setInterval(tick,1000);
    document.getElementById("cdTitle").innerText="Remaining Time";
    renderLastOnline();
  }

  // Sun SVG path / Moon SVG path
  const SUN_PATH="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z";
  const MOON_PATH="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z";

  function applyTheme(){
    document.documentElement.setAttribute("data-theme",dark?"dark":"light");
    document.getElementById("themeIconPath").setAttribute("d",dark?SUN_PATH:MOON_PATH);
    localStorage.setItem("kb_theme",dark?"dark":"light");
  }

  function copyText(elId, btnId){
    const txt=document.getElementById(elId).innerText;
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.getElementById(btnId);
      const orig=btn.innerText; btn.innerText="Copied!"; btn.style.opacity=".7";
      setTimeout(()=>{btn.innerText=orig;btn.style.opacity="1";},1800);
    }).catch(()=>{});
  }

  function init(){
    applyTheme();
    if(emailL.length){
      document.getElementById("userChip").style.display="flex";
      document.getElementById("userEmail").innerText=emailL[0];
    }
    const sb=document.getElementById("supportBtn");
    if(supUrl){sb.href=supUrl;sb.style.display="grid";}
    renderStats();renderCountdown();
  }

  document.getElementById("themeBtn").addEventListener("click",()=>{dark=!dark;applyTheme();});
  try { init(); } catch(e){ console.error("init error:",e); }
  // Safety net — always remove skeleton
  setTimeout(()=>document.body.classList.remove("loading"), 500);

  // ── PWA: register a minimal service worker inline ──
  if("serviceWorker" in navigator){
    const sw=`self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>e.waitUntil(clients.claim()));self.addEventListener("fetch",e=>e.respondWith(fetch(e.request).catch(()=>new Response("Offline",{status:503}))));`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:"./"}).catch(()=>{});
  }
</script>
